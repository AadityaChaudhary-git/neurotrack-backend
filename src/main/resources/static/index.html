<!DOCTYPE html>
<html>
<head>
    <title>NeuroTrack Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }
        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>NeuroTrack Prediction 🚀</h1>

<input type="number" id="screen" placeholder="Screen Time"><br>
<input type="number" id="unlocks" placeholder="Unlocks"><br>
<input type="number" id="night" placeholder="Night Usage"><br>

<button onclick="predict()">Predict</button>

<div id="result"></div>

<script>
    function predict() {
        const data = {
            screen_time: parseFloat(document.getElementById("screen").value),
            unlocks: parseFloat(document.getElementById("unlocks").value),
            night_usage: parseFloat(document.getElementById("night").value)
        };

        fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerText =
                "Prediction: " + data.prediction;
        })
        .catch(err => {
            document.getElementById("result").innerText = "Error!";
        });
    }
</script>

</body>
</html>
